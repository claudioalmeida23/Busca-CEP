<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BUSCA CEP BRASIL - CAAS</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root { --accent: #00d2ff; --bg: #05070a; --glass: rgba(15, 23, 42, 0.9); }

        /* ANTI-CÓPIA */
        * { 
            -webkit-user-select: none !important;
            user-select: none !important;
            -webkit-touch-callout: none !important;
            box-sizing: border-box;
        }
        input { user-select: text !important; -webkit-user-select: text !important; }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; 
            color: white; overflow: hidden; 
        }
        
        #map { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; 
            filter: invert(100%) hue-rotate(180deg) brightness(95%);
            pointer-events: none; 
        }
        
        .ui-wrapper {
            position: relative; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; width: 100%; height: 100%;
            padding: 20px; pointer-events: none;
        }

        .interactive { pointer-events: auto; width: 100%; max-width: 500px; }

        .card { 
            background: var(--glass); backdrop-filter: blur(15px); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; 
            padding: 15px; margin-bottom: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .search-box { 
            display: flex; gap: 8px; background: rgba(0,0,0,0.3); 
            padding: 5px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); 
        }
        
        input { 
            flex: 1; background: transparent; border: none; padding: 12px; 
            color: white; font-size: 16px; outline: none; width: 100%;
        }
        
        .btn-search { 
            background: var(--accent); border: none; border-radius: 12px; 
            padding: 10px 20px; cursor: pointer; display: flex; align-items: center; 
        }

        /* ESTILO DO AVISO DE PRECISÃO */
        .disclaimer-box {
            font-size: 11px;
            background: rgba(255, 165, 0, 0.1);
            border-left: 3px solid orange;
            padding: 10px;
            margin-top: 10px;
            color: #ddd;
            line-height: 1.4;
        }
        .disclaimer-box b { color: orange; }

        .btn-gps { 
            display: block; width: 100%; background: white; color: black; 
            text-align: center; padding: 15px; border-radius: 12px; 
            font-weight: 800; text-decoration: none; margin-top: 10px; 
            text-transform: uppercase; font-size: 12px; 
        }
        
        .btn-loc { 
            position: fixed; bottom: 30px; right: 20px; 
            width: 60px; height: 60px; background: var(--accent); 
            border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; box-shadow: 0 5px 20px rgba(0,210,255,0.4); 
            border: 2px solid white; pointer-events: auto; z-index: 100;
        }

        footer { text-align: center; font-size: 9px; line-height: 1.4; }
        footer b { color: var(--accent); }
        footer span { opacity: 0.6; display: block; margin-top: 4px; }

        .ad-footer {
            background: rgba(0, 0, 0, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px; text-align: center; font-size: 10px;
            color: #444; margin-top: 10px; border-radius: 10px; width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;" onselectstart="return false;" ondragstart="return false;">

<div id="map"></div>

<div class="ui-wrapper">
    <div class="interactive card">
        <div style="text-align: center; font-size: 11px; letter-spacing: 2px; margin-bottom: 12px; color: var(--accent); font-weight: 800;">LOCALIZADOR INTELIGENTE</div>
        <div class="search-box">
            <input id="cep" type="tel" placeholder="CEP 00000-000" maxlength="9">
            <button class="btn-search" onclick="executarBusca()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
        </div>
    </div>

    <div id="display-resultado" class="interactive"></div>

    <div class="interactive" style="margin-top: auto;">
        <footer class="card" style="margin-bottom: 5px; padding: 12px;">
            Desenvolvido por: <b>CAAS</b>
            <span>BrasilAPI • Leaflet • Nominatim • OpenStreetMap</span>
        </footer>
        
        
    </div>
</div>

<div class="btn-loc" onclick="focarUsuario()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3m10-10h-3M5 12H2"/></svg>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    // BLOQUEIO DE INSPEÇÃO
    document.onkeydown = function(e) {
        if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) return false;
    };

    const map = L.map('map', { 
        zoomControl: false, attributionControl: false,
        dragging: false, touchZoom: false, doubleClickZoom: false,
        scrollWheelZoom: false, boxZoom: false, keyboard: false
    }).setView([-14.23, -51.92], 4);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    let marker;

    async function executarBusca() {
        const input = document.getElementById('cep');
        const cep = input.value.replace(/\D/g, '');
        const tela = document.getElementById('display-resultado');
        
        if (cep.length !== 8) return;
        tela.innerHTML = '<div class="card">Aguarde...</div>';

        try {
            const res = await fetch('https://brasilapi.com.br/api/cep/v2/' + cep);
            const data = await res.json();
            
            if (!data.cep) {
                tela.innerHTML = '<div class="card">CEP não encontrado.</div>';
                return;
            }

            // Interface com o Aviso de Precisão integrado
            tela.innerHTML = `
                <div class="card" style="animation: fadeIn 0.3s ease-out forwards;">
                    <span class="label">Logradouro</span>
                    <span class="value">${data.street || 'Endereço Geral'}</span>
                    <span class="label">Bairro / Cidade</span>
                    <span class="value">${data.neighborhood || '-'} • ${data.city}/${data.state}</span>
                    
                    <div id="gps-box"></div>

                    <div class="disclaimer-box">
                        ⚠️ <b>Nota sobre Precisão:</b> Algoritmos de geocodificação podem falhar em ruas homônimas ou áreas rurais. Confira sempre bairro e cidade antes de navegar.
                    </div>
                </div>
            `;

            const query = encodeURIComponent(`${data.street || ""} ${data.city} ${data.state} Brasil`);
            const geoRes = await fetch('https://nominatim.openstreetmap.org/search?format=json&q=' + query);
            const geoData = await geoRes.json();

            if (geoData.length > 0) {
                const { lat, lon } = geoData;
                map.setView([lat, lon], 16);
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lon]).addTo(map);
                
                const gpsUrl = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lon}`;
                document.getElementById('gps-box').innerHTML = `
                    <a href="${gpsUrl}" target="_blank" class="btn-gps">INICIAR ROTA GPS</a>
                `;
            } else {
                const textDest = encodeURIComponent(`${data.street}, ${data.city}`);
                const gpsUrlText = `https://www.google.com/maps/dir/?api=1&destination=${textDest}`;
                document.getElementById('gps-box').innerHTML = `
                    <a href="${gpsUrlText}" target="_blank" class="btn-gps">GPS PELO ENDEREÇO</a>
                `;
            }

        } catch (e) {
            tela.innerHTML = '<div class="card">Erro na conexão.</div>';
        }
    }

    function focarUsuario() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 16);
            L.circleMarker([p.coords.latitude, p.coords.longitude], { radius: 8, fillColor: "#00d2ff", color: "white", fillOpacity: 1 }).addTo(map);
        });
    }

    document.getElementById('cep').oninput = e => {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length > 5) v = v.slice(0, 5) + '-' + v.slice(5, 8);
        e.target.value = v;
    };

    document.getElementById('cep').onkeypress = e => { if(e.key === 'Enter') executarBusca(); };
</script>
</body>
</html>
